<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - GUVI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header d-flex justify-content-between align-items-center bg-info text-white">
                        <h4>Profile</h4>
                        <button onclick="logout()" class="btn btn-sm btn-light">Logout</button>
                    </div>
                    <div class="card-body">
                        <div id="profileMessage"></div>
                        
                        <form id="profileForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label>Username</label>
                                    <input type="text" class="form-control" id="username" readonly>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label>Email</label>
                                    <input type="email" class="form-control" id="email" readonly>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label>Age</label>
        <!-- CHANGED: added id="age" -->
                                    <input type="number" class="form-control" id="age" name="age" required>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label>Date of Birth</label>
        <!-- CHANGED: added id="dob" -->
                                    <input type="date" class="form-control" id="dob" name="dob" required>
                                </div>
                            </div>

                                <div class="mb-3">
                                    <label>Contact Number</label>
    <!-- CHANGED: added id="contact" -->
                                    <input type="tel" class="form-control" id="contact" name="contact" required>
                                </div>

                                <div class="mb-3">
    <label>Address</label>
    <!-- CHANGED: added id="address" -->
                                 <textarea class="form-control" id="address" name="address" rows="3"></textarea>
                                </div>
                            <button type="submit" class="btn btn-primary w-100" id="updateBtn">Update Profile</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
